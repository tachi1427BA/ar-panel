<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebXR Character Panel</title>
  <meta name="description" content="AR立ち絵Viewer">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; background: #111; }

    /* ── Utility ── */
    .hidden { display: none !important; }
    .u-button {
      display: inline-flex; align-items: center; justify-content: center;
      background-color: #3498db; color: white;
      padding: 6px 14px; font-size: 15px;
      border: none; border-radius: 8px; cursor: pointer; margin: 3px;
      pointer-events: auto; white-space: nowrap;
    }
    .u-button:disabled { background-color: #666; cursor: not-allowed; }

    /* ── Main overlay (dom-overlay root) ── */
    #main-ui {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      color: white; z-index: 1000;
      pointer-events: none;
    }
    #main-ui.shooting-mode > * {
      opacity: 0;
      visibility: hidden;
      pointer-events: none !important;
    }

    /* ── Top bar ── */
    #top-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 54px;
      background: rgba(0, 0, 0, 0.65);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px;
      pointer-events: auto;
    }
    #app-title { font-size: 16px; font-weight: bold; }

    /* ── Instructions ── */
    #instructions {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 16px; text-align: center; white-space: nowrap;
      text-shadow: 0 0 6px black;
      background: rgba(0, 0, 0, 0.5); padding: 8px 18px; border-radius: 10px;
      pointer-events: none;
    }

    /* ── Edit controls (top, below top-bar) ── */
    #edit-controls {
      position: fixed; top: 62px; left: 50%; transform: translateX(-50%);
      display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
      gap: 2px;
      width: min(720px, calc(100% - 24px));
      pointer-events: none;
    }
    #edit-controls .u-button { pointer-events: auto; }
    #selection-status {
      width: 100%; text-align: center; font-size: 13px;
      text-shadow: 0 0 4px black; margin-bottom: 2px;
    }

    /* ── Character panel (slide-up from bottom) ── */
    #char-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(15, 15, 22, 0.92);
      border-radius: 16px 16px 0 0;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      transform: translateY(calc(100% - 60px));
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      pointer-events: auto;
      max-height: 70vh;
      display: flex; flex-direction: column;
    }
    #char-panel.expanded { transform: translateY(0); }

    #char-panel-handle {
      height: 60px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 8px; cursor: pointer; user-select: none;
    }
    #char-handle-preview {
      height: 38px; width: auto; border-radius: 4px;
      object-fit: contain; pointer-events: none;
    }
    .handle-bar {
      width: 32px; height: 4px;
      background: rgba(255, 255, 255, 0.35); border-radius: 2px;
    }
    #char-panel-label {
      font-size: 13px; color: rgba(255, 255, 255, 0.75);
      min-width: 80px; text-align: center;
    }

    #char-panel-body {
      overflow-y: auto; padding: 4px 10px 16px;
      flex: 1; min-height: 0;
      display: flex; flex-direction: column; gap: 8px;
    }
    #char-panel-body::-webkit-scrollbar { width: 5px; }
    #char-panel-body::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

    #char-panel-top-row {
      display: flex; align-items: center; gap: 12px;
    }
    #image-preview {
      width: 56px; height: 72px; object-fit: contain;
      border: 1.5px solid rgba(255, 255, 255, 0.3); border-radius: 6px;
      background: rgba(255, 255, 255, 0.05); flex-shrink: 0;
    }

    #preset-selector {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 4px; cursor: grab;
    }
    .preset-button { padding: 6px 2px; font-size: 13px; }
    .preset-button.active-preset { background-color: #2ecc71; color: #000; }
    /* ── Start overlay ── */
    #start-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.82);
      z-index: 2000; cursor: pointer;
      gap: 20px;
    }
    #start-overlay-title {
      font-size: 22px; font-weight: bold; color: white;
      text-shadow: 0 0 8px rgba(52,152,219,0.8);
    }
    #start-overlay-hint {
      font-size: 16px; color: rgba(255,255,255,0.75);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="main-ui">

    <!-- ── Start overlay (shown before session begins) ── -->
    <div id="start-overlay">
      <div id="start-overlay-title">AR立ち絵 Viewer</div>
      <div id="start-overlay-hint">タップして開始</div>
    </div>

    <!-- ── Top bar ── -->
    <div id="top-bar">
      <span id="app-title">AR立ち絵 Viewer</span>
      <div>
        <button id="exit-ar-button" class="u-button hidden">戻る</button>
      </div>
    </div>

    <!-- ── Center instructions ── -->
    <div id="instructions" style="display: none;"></div>

    <!-- ── Edit controls (shown during session) ── -->
    <div id="edit-controls" style="display: none;">
      <div id="selection-status">キャラクター未選択</div>
      <button id="add-character-button" class="u-button hidden">キャラを追加</button>
      <button id="scale-down-button" class="u-button" disabled>小さく</button>
      <button id="scale-up-button" class="u-button" disabled>大きく</button>
      <button id="shoot-mode-button" class="u-button" disabled>撮影モード</button>
    </div>

    <!-- ── Character selection panel ── -->
    <div id="char-panel" class="expanded">
      <div id="char-panel-handle">
        <div class="handle-bar"></div>
        <img id="char-handle-preview" src="シロコ.png">
        <span id="char-panel-label">シロコ</span>
        <div class="handle-bar"></div>
      </div>
      <div id="char-panel-body">
        <div id="char-panel-top-row">
          <img id="image-preview" src="シロコ.png">
          <div style="display:flex; flex-direction:column; gap:4px;">
            <input type="file" id="image-upload-input" accept="image/png, image/jpeg" style="display:none;">
            <label for="image-upload-input" class="u-button" style="font-size:13px;">ファイルを選択</label>
          </div>
        </div>
        <div id="preset-selector">
          <button class="u-button preset-button active-preset" data-src="シロコ.png">シロコ</button>
          <button class="u-button preset-button" data-src="ホシノ.png">ホシノ</button>
          <button class="u-button preset-button" data-src="ノノミ.png">ノノミ</button>
          <button class="u-button preset-button" data-src="セリカ.png">セリカ</button>
          <button class="u-button preset-button" data-src="アヤネ.png">アヤネ</button>
          <button class="u-button preset-button" data-src="アル.png">アル</button>
          <button class="u-button preset-button" data-src="kayoko.png">カヨコ</button>
          <button class="u-button preset-button" data-src="ムツキ.png">ムツキ</button>
          <button class="u-button preset-button" data-src="ハルカ.png">ハルカ</button>
          <button class="u-button preset-button" data-src="アリス.png">アリス</button>
          <button class="u-button preset-button" data-src="モモイ.png">モモイ</button>
          <button class="u-button preset-button" data-src="ミドリ.png">ミドリ</button>
          <button class="u-button preset-button" data-src="ユズ.png">ユズ</button>
          <button class="u-button preset-button" data-src="ヒフミ.png">ヒフミ</button>
          <button class="u-button preset-button" data-src="ハナコ.png">ハナコ</button>
          <button class="u-button preset-button" data-src="アズサ.png">アズサ</button>
          <button class="u-button preset-button" data-src="コハル.png">コハル</button>
          <button class="u-button preset-button" data-src="ユウカ.png">ユウカ</button>
          <button class="u-button preset-button" data-src="ノア.png">ノア</button>
          <button class="u-button preset-button" data-src="コユキ.png">コユキ</button>
          <button class="u-button preset-button" data-src="リオ.png">リオ</button>
        </div>
      </div>
    </div>

  </div><!-- #main-ui -->

  <a-scene
    id="scene"
    webxr="optionalFeatures: hit-test, local-floor, dom-overlay; overlayElement: #main-ui;"
    ar-hit-test="target: #reticle; type: hittest; mapSize: 0.5 0.5"
    xr-mode-ui="enabled: false"
    renderer="colorManagement: true;"
  >
    <a-assets>
    </a-assets>
    <a-camera></a-camera>

    <a-entity
      id="reticle"
      geometry="primitive: ring; radius-inner: 0.05; radius-outer: 0.08;"
      material="color: white; shader: flat;"
      rotation="-90 0 0"
      visible="false"
    ></a-entity>

    <a-entity id="characters-container"></a-entity>
  </a-scene>

  <script>
    document.addEventListener('DOMContentLoaded', () => {

      // ── DOM refs ──
      const sceneEl            = document.querySelector('a-scene');
      const mainUI             = document.getElementById('main-ui');
      const startOverlay       = document.getElementById('start-overlay');
      const exitArButton       = document.getElementById('exit-ar-button');
      const instructionsEl     = document.getElementById('instructions');
      const editControls       = document.getElementById('edit-controls');
      const selectionStatus    = document.getElementById('selection-status');
      const addCharacterButton = document.getElementById('add-character-button');
      const scaleDownButton    = document.getElementById('scale-down-button');
      const scaleUpButton      = document.getElementById('scale-up-button');
      const shootModeButton    = document.getElementById('shoot-mode-button');
      const charPanel          = document.getElementById('char-panel');
      const charPanelHandle    = document.getElementById('char-panel-handle');
      const charPanelLabel     = document.getElementById('char-panel-label');
      const charHandlePreview  = document.getElementById('char-handle-preview');
      const imagePreview       = document.getElementById('image-preview');
      const imageUploadInput   = document.getElementById('image-upload-input');
      const presetSelector     = document.getElementById('preset-selector');
      const charPanelBody      = document.getElementById('char-panel-body');
      const reticle            = document.getElementById('reticle');
      const charactersContainer = document.getElementById('characters-container');

      // ── Constants ──
      const CHAR_HEIGHT = 1.7;

      // ── State ──
      let currentCharacterSrc   = 'シロコ.png';
      let currentCharacterWidth = 0.85;
      let currentCharacterLabel = 'シロコ';
      let currentCharacterKey   = 'シロコ.png';
      let activeCharacter       = null;
      let placedCharacters      = [];
      let isFallbackMode        = false;
      let isShootingMode        = false;
      let suppressNextPlacement = false;
      let isExitingSession      = false;
      let exitSessionTimeoutId  = null;
      let characterCounter      = 0;
      const createdObjectUrls   = new Set();

      // ── Utility ──
      function cloneVector(v) { return { x: v.x, y: v.y, z: v.z }; }

      function suppressPlacementTemporarily() {
        suppressNextPlacement = true;
        setTimeout(() => { suppressNextPlacement = false; }, 250);
      }

      function clearExitTimeout() {
        if (exitSessionTimeoutId !== null) {
          clearTimeout(exitSessionTimeoutId);
          exitSessionTimeoutId = null;
        }
      }

      function getActiveXrSession() {
        try { return sceneEl.renderer.xr.getSession(); } catch (_) { return null; }
      }

      function sessionIsActive() {
        return editControls.style.display !== 'none';
      }

      // ── Panel ──
      charPanelHandle.addEventListener('click', () => {
        charPanel.classList.toggle('expanded');
      });
      function collapsePanel() { charPanel.classList.remove('expanded'); }
      function expandPanel()   { charPanel.classList.add('expanded'); }

      // ── Control states ──
      function updateControlStates() {
        scaleDownButton.disabled = !activeCharacter;
        scaleUpButton.disabled   = !activeCharacter;
        shootModeButton.disabled = placedCharacters.length === 0;
      }

      function updateSelectionStatus() {
        selectionStatus.textContent = activeCharacter
          ? `選択中: ${activeCharacter.dataset.label}`
          : 'キャラクター未選択';
      }

      function updateInstructions() {
        if (!sessionIsActive() || isShootingMode) {
          instructionsEl.style.display = 'none';
          return;
        }
        if (isFallbackMode) {
          instructionsEl.textContent = '「キャラを追加」で配置 / キャラをタップで選択';
        } else {
          instructionsEl.textContent = reticle.getAttribute('visible')
            ? '平面をタップで配置 / キャラをタップで選択'
            : '平面にカメラを向けてください';
        }
        instructionsEl.style.display = 'block';
      }

      // ── Active character ──
      function setActiveCharacter(el) {
        if (activeCharacter && activeCharacter.__outline) {
          activeCharacter.__outline.setAttribute('visible', false);
        }
        activeCharacter = el || null;
        if (activeCharacter && activeCharacter.__outline) {
          activeCharacter.__outline.setAttribute('visible', true);
        }
        updateSelectionStatus();
        updateControlStates();
      }

      // ── Character entity construction ──
      function buildBodyElement() {
        const el = document.createElement('a-plane');
        el.setAttribute('height', CHAR_HEIGHT);
        el.setAttribute('width', currentCharacterWidth);
        el.setAttribute('position', `0 ${CHAR_HEIGHT / 2} 0`);
        el.setAttribute('material', {
          src: currentCharacterSrc,
          shader: 'flat',
          transparent: true,
          alphaTest: 0.5,
        });
        return el;
      }

      function buildShadowElement() {
        const el = document.createElement('a-plane');
        el.setAttribute('height', CHAR_HEIGHT);
        el.setAttribute('width', currentCharacterWidth);
        el.setAttribute('position', `0 0.005 ${CHAR_HEIGHT / 2}`);
        el.setAttribute('rotation', '-90 0 0');
        const src = currentCharacterSrc;
        el.addEventListener('loaded', () => {
          new THREE.TextureLoader().load(src, (tex) => {
            const mesh = el.getObject3D('mesh');
            if (!mesh) return;
            mesh.material = new THREE.MeshBasicMaterial({
              map: tex,
              color: 0x000000,
              transparent: true,
              opacity: 0.45,
              alphaTest: 0.5,
              depthWrite: false,
              side: THREE.DoubleSide,
            });
            mesh.material.needsUpdate = true;
          });
        });
        return el;
      }

      function buildOutlineElement() {
        const outer = document.createElement('a-entity');
        outer.setAttribute('position', `0 ${CHAR_HEIGHT / 2} -0.001`);
        outer.setAttribute('visible', false);
        const w = currentCharacterWidth + 0.06;
        const h = CHAR_HEIGHT + 0.06;
        const t = 0.025;
        const mat = 'color: #ffffff; shader: flat';
        [
          [w, t,  0,               h / 2 - t / 2],
          [w, t,  0,             -(h / 2 - t / 2)],
          [t, h, -(w / 2 - t / 2), 0],
          [t, h,  (w / 2 - t / 2), 0],
        ].forEach(([bw, bh, bx, by]) => {
          const bar = document.createElement('a-plane');
          bar.setAttribute('width', bw);
          bar.setAttribute('height', bh);
          bar.setAttribute('position', `${bx} ${by} 0`);
          bar.setAttribute('material', mat);
          outer.appendChild(bar);
        });
        return outer;
      }

      function createCharacterEntity(position, rotation) {
        const el = document.createElement('a-entity');
        el.dataset.characterId  = String(++characterCounter);
        el.dataset.label        = currentCharacterLabel || `キャラクター${characterCounter}`;
        el.dataset.characterKey = currentCharacterKey;
        el.setAttribute('position', cloneVector(position));
        // Use only Y rotation — reticle sends X=-90 (flat on floor) which would
        // lay the character plane down and show the image at ground level.
        el.setAttribute('rotation', { x: 0, y: (rotation && rotation.y) || 0, z: 0 });
        el.setAttribute('scale', '1 1 1');

        const body    = buildBodyElement();
        const shadow  = buildShadowElement();
        const outline = buildOutlineElement();

        el.appendChild(outline);
        el.appendChild(body);
        el.appendChild(shadow);
        el.__outline = outline;

        charactersContainer.appendChild(el);
        placedCharacters.push(el);
        setActiveCharacter(el);
        return el;
      }

      function clearPlacedCharacters() {
        placedCharacters.forEach(el => el.remove());
        placedCharacters = [];
        setActiveCharacter(null);
      }

      function findPlacedCharacterByKey(key) {
        return placedCharacters.find(el => el.dataset.characterKey === key) || null;
      }

      // ── Placement ──
      function placeCharacterAt(position, rotation) {
        const existing = findPlacedCharacterByKey(currentCharacterKey);
        if (existing) {
          setActiveCharacter(existing);
          return existing;
        }
        return createCharacterEntity(position, rotation);
      }

      function fallbackPlacementPosition(index) {
        if (index === 0) return { x: 0, y: -0.5, z: -2 };
        const spread = Math.ceil(index / 2);
        const dir    = index % 2 === 1 ? 1 : -1;
        return { x: dir * spread * 0.55, y: -0.5, z: -2 - (spread - 1) * 0.2 };
      }

      function addFallbackCharacter() {
        placeCharacterAt(
          fallbackPlacementPosition(placedCharacters.length),
          { x: 0, y: 0, z: 0 }
        );
      }

      // ── Shooting mode ──
      function enterShootingMode() {
        if (!placedCharacters.length) return;
        isShootingMode = true;
        mainUI.classList.add('shooting-mode');
        updateInstructions();
      }

      function exitShootingMode() {
        if (!isShootingMode) return;
        isShootingMode = false;
        mainUI.classList.remove('shooting-mode');
        updateInstructions();
      }

      // ── Session mode ──
      function enterFallbackMode(message) {
        alert(message);
        isFallbackMode = true;
        startOverlay.style.display = 'none';
        exitArButton.classList.remove('hidden');
        editControls.style.display = 'flex';
        addCharacterButton.classList.remove('hidden');
        collapsePanel();
        if (!placedCharacters.length) addFallbackCharacter();
        updateInstructions();
        updateControlStates();
      }

      function resetToMainMenu() {
        clearExitTimeout();
        isExitingSession      = false;
        exitArButton.disabled = false;
        exitShootingMode();
        isFallbackMode        = false;
        suppressNextPlacement = false;
        exitArButton.classList.add('hidden');
        startOverlay.style.display = '';
        instructionsEl.style.display = 'none';
        editControls.style.display   = 'none';
        addCharacterButton.classList.add('hidden');
        reticle.setAttribute('visible', false);
        clearPlacedCharacters();
        expandPanel();
      }

      function finishExitToMainMenu() {
        if (!isExitingSession && !sessionIsActive()) return;
        resetToMainMenu();
      }

      function requestExitToMainMenu() {
        const xrSession = getActiveXrSession();
        if (!xrSession) { finishExitToMainMenu(); return; }
        if (isExitingSession) return;

        isExitingSession      = true;
        exitArButton.disabled = true;

        Promise.resolve(xrSession.end()).catch(err => {
          console.error(err);
          finishExitToMainMenu();
        });

        clearExitTimeout();
        exitSessionTimeoutId = setTimeout(() => {
          if (isExitingSession) finishExitToMainMenu();
        }, 1000);
      }

      // ── Screen projection / tap detection ──
      function projectCharacterToScreen(el) {
        if (!sceneEl.camera) return null;
        const cam     = sceneEl.camera;
        const centerW = el.object3D.localToWorld(new THREE.Vector3(0, CHAR_HEIGHT / 2, 0));
        const topW    = el.object3D.localToWorld(new THREE.Vector3(0, CHAR_HEIGHT, 0));
        const botW    = el.object3D.localToWorld(new THREE.Vector3(0, 0, 0));
        const cProj   = centerW.clone().project(cam);
        const tProj   = topW.clone().project(cam);
        const bProj   = botW.clone().project(cam);

        if (cProj.z < -1 || cProj.z > 1) return null;

        return {
          x:      (cProj.x  * 0.5 + 0.5) * window.innerWidth,
          y:      (-cProj.y * 0.5 + 0.5) * window.innerHeight,
          height: Math.abs(
            (-tProj.y * 0.5 + 0.5) * window.innerHeight -
            (-bProj.y * 0.5 + 0.5) * window.innerHeight
          ),
        };
      }

      function findTappedCharacter(clientX, clientY) {
        if (!sceneEl.camera || !placedCharacters.length) return null;
        sceneEl.object3D.updateMatrixWorld(true);
        let closest = null, minDist = Infinity;
        placedCharacters.forEach(el => {
          const proj = projectCharacterToScreen(el);
          if (!proj) return;
          const r    = Math.max(48, proj.height * 0.35);
          const dist = Math.hypot(proj.x - clientX, proj.y - clientY);
          if (dist <= r && dist < minDist) { minDist = dist; closest = el; }
        });
        return closest;
      }

      function handleScenePointer(clientX, clientY) {
        if (!sessionIsActive()) return;
        if (isShootingMode) {
          exitShootingMode();
          suppressPlacementTemporarily();
          return;
        }
        const hit = findTappedCharacter(clientX, clientY);
        if (hit) {
          setActiveCharacter(hit);
          suppressPlacementTemporarily();
        }
      }

      // ── Current character ──
      function updatePresetHighlight(key) {
        document.querySelectorAll('.preset-button').forEach(btn => {
          btn.classList.toggle('active-preset', btn.dataset.src === key);
        });
      }

      function setCurrentCharacter(source, label, key) {
        const resolvedKey = key || source;
        currentCharacterSrc   = source;
        currentCharacterLabel = label;
        currentCharacterKey   = resolvedKey;
        imagePreview.src      = source;
        charHandlePreview.src = source;
        charPanelLabel.textContent = label;
        updatePresetHighlight(resolvedKey);
      }

      function updateCurrentCharacterDimensions() {
        if (!imagePreview.src || !imagePreview.complete || !imagePreview.naturalHeight) return;
        currentCharacterWidth = CHAR_HEIGHT * (imagePreview.naturalWidth / imagePreview.naturalHeight);
      }

      imagePreview.addEventListener('load', updateCurrentCharacterDimensions);
      if (imagePreview.complete) updateCurrentCharacterDimensions();

      // ── Preset / upload events ──
      presetSelector.addEventListener('click', e => {
        const btn = e.target.closest('.preset-button');
        if (!btn || !btn.dataset.src) return;
        setCurrentCharacter(btn.dataset.src, btn.textContent.trim(), btn.dataset.src);
      });

      imageUploadInput.addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        createdObjectUrls.add(url);
        const key = `upload:${file.name}:${file.size}:${file.lastModified}`;
        setCurrentCharacter(url, file.name || 'アップロード画像', key);
      });

      // ── Start overlay tap ──
      function startARSession() {
        if (!navigator.xr) {
          enterFallbackMode('お使いのブラウザはWebXRに対応していません。3Dビューで表示します。');
          return;
        }
        navigator.xr.isSessionSupported('immersive-ar').then(supported => {
          if (!supported) {
            enterFallbackMode('お使いのブラウザはARに対応していません。3Dビューで表示します。');
            return;
          }
          isFallbackMode = false;
          startOverlay.style.display = 'none';
          exitArButton.classList.remove('hidden');
          editControls.style.display = 'flex';
          addCharacterButton.classList.add('hidden');
          collapsePanel();
          updateInstructions();
          updateControlStates();
          sceneEl.enterAR();
        }).catch(err => {
          console.error(err);
          enterFallbackMode('ARセッションの確認中にエラーが発生しました。3Dビューで表示します。');
        });
      }

      startOverlay.addEventListener('pointerup', startARSession);

      // ── Scene events ──
      sceneEl.addEventListener('ar-hit-test-achieved', () => {
        if (!isFallbackMode && !isShootingMode) {
          reticle.setAttribute('visible', true);
          updateInstructions();
        }
      });

      sceneEl.addEventListener('ar-hit-test-lost', () => {
        if (!isFallbackMode && !isShootingMode) {
          reticle.setAttribute('visible', false);
          updateInstructions();
        }
      });

      sceneEl.addEventListener('ar-hit-test-select', () => {
        if (isShootingMode) {
          exitShootingMode();
          suppressPlacementTemporarily();
          return;
        }
        if (suppressNextPlacement) { suppressNextPlacement = false; return; }
        const pos = reticle.getAttribute('position');
        const rot = reticle.getAttribute('rotation');
        if (!pos) return;
        placeCharacterAt(pos, rot || { x: 0, y: 0, z: 0 });
        updateInstructions();
      });

      sceneEl.addEventListener('exit-vr', () => { finishExitToMainMenu(); });

      // ── Edit controls ──
      scaleUpButton.addEventListener('click', () => {
        if (!activeCharacter) return;
        const s = activeCharacter.getAttribute('scale');
        activeCharacter.setAttribute('scale', `${s.x * 1.2} ${s.y * 1.2} ${s.z * 1.2}`);
      });

      scaleDownButton.addEventListener('click', () => {
        if (!activeCharacter) return;
        const s = activeCharacter.getAttribute('scale');
        activeCharacter.setAttribute('scale', `${s.x * 0.8} ${s.y * 0.8} ${s.z * 0.8}`);
      });

      shootModeButton.addEventListener('click', () => enterShootingMode());
      addCharacterButton.addEventListener('click', () => addFallbackCharacter());
      exitArButton.addEventListener('click', () => requestExitToMainMenu());

      // ── Global pointer (scene tap) ──
      // Suppress XR placement when the tap target is inside the UI overlay.
      // ar-hit-test-select fires even for dom-overlay taps, so we suppress it here.
      mainUI.addEventListener('pointerdown', suppressPlacementTemporarily, true);

      window.addEventListener('pointerup', e => {
        if (!sessionIsActive()) return;
        if (mainUI.contains(e.target)) return;
        handleScenePointer(e.clientX, e.clientY);
      }, true);

      // ── Cleanup ──
      window.addEventListener('beforeunload', () => {
        createdObjectUrls.forEach(url => URL.revokeObjectURL(url));
      });

      // ── Panel body drag-scroll (mouse) ──
      let drag = { active: false, startY: 0, scrollTop: 0 };
      charPanelBody.addEventListener('mousedown', e => {
        drag = { active: true, startY: e.pageY - charPanelBody.offsetTop, scrollTop: charPanelBody.scrollTop };
        charPanelBody.style.cursor = 'grabbing';
      });
      charPanelBody.addEventListener('mouseleave', () => { drag.active = false; charPanelBody.style.cursor = ''; });
      charPanelBody.addEventListener('mouseup',    () => { drag.active = false; charPanelBody.style.cursor = ''; });
      charPanelBody.addEventListener('mousemove', e => {
        if (!drag.active) return;
        e.preventDefault();
        charPanelBody.scrollTop = drag.scrollTop - (e.pageY - charPanelBody.offsetTop - drag.startY);
      });

    });
  </script>
</body>
</html>
