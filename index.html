<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebXR Character Panel</title>
  <meta name="description" content="AR立ち絵Viewer">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; }
    .overlay-ui {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center; flex-direction: column;
      color: white; z-index: 1000;
      pointer-events: auto;
    }
    .overlay-ui::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: -1;
      transition: background-color 0.3s ease;
    }
    .overlay-ui.ar-mode {
      pointer-events: none;
    }
    .overlay-ui.ar-mode::before,
    .overlay-ui.shooting-mode::before {
      background-color: transparent;
    }
    .overlay-ui.ui-exited::before {
      background-color: #333;
    }
    .overlay-ui.shooting-mode {
      pointer-events: none;
    }
    .overlay-ui.shooting-mode > * {
      opacity: 0;
      visibility: hidden;
    }
    .hidden { display: none !important; }
    .u-button {
      display: inline-block;
      background-color: #3498db; color: white;
      padding: 6px 20px; font-size: 16px;
      border: none; border-radius: 8px; cursor: pointer; margin: 5px;
      pointer-events: auto;
    }
    .u-button:disabled { background-color: #888; cursor: not-allowed; }
    #upload-container { text-align: center; }
    #image-preview {
      display: block;
      width: 300px; height: 300px; object-fit: contain;
      margin: 10px auto;
      border: 2px solid #fff;
    }
    #edit-controls {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
      width: min(720px, calc(100% - 24px));
      pointer-events: none;
    }
    #edit-controls .u-button,
    #selection-status {
      pointer-events: auto;
    }
    #selection-status {
      width: 100%;
      text-align: center;
      font-size: 14px;
      margin-bottom: 6px;
      text-shadow: 0 0 4px black;
    }
    #preset-selector {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      margin-top: 10px;
      padding: 10px;
      max-height: 220px;
      overflow-y: auto;
      border-top: 1px solid #555;
      border-bottom: 1px solid #555;
      background-color: rgba(0, 0, 0, 0.2);
      cursor: grab;
    }
    #preset-selector::-webkit-scrollbar {
      width: 8px;
    }
    #preset-selector::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 4px;
    }
    #instructions {
      position: absolute;
      bottom: 33vh;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      text-align: center;
      font-size: 18px;
      text-shadow: 0 0 4px black;
    }
  </style>
</head>
<body>
  <div id="main-ui" class="overlay-ui">
    <div id="upload-container">
      <h3>キャラクターを選択またはアップロード</h3>
      <input type="file" id="image-upload-input" accept="image/png, image/jpeg" style="display: none;">
      <label for="image-upload-input" class="u-button">ファイルを選択</label>

      <div id="preset-selector">
        <button class="u-button preset-button" data-src="シロコ.png">シロコ</button>
        <button class="u-button preset-button" data-src="ホシノ.png">ホシノ</button>
        <button class="u-button preset-button" data-src="ノノミ.png">ノノミ</button>
        <button class="u-button preset-button" data-src="セリカ.png">セリカ</button>
        <button class="u-button preset-button" data-src="アヤネ.png">アヤネ</button>
        <button class="u-button preset-button" data-src="アル.png">アル</button>
        <button class="u-button preset-button" data-src="kayoko.png">カヨコ</button>
        <button class="u-button preset-button" data-src="ムツキ.png">ムツキ</button>
        <button class="u-button preset-button" data-src="ハルカ.png">ハルカ</button>
        <button class="u-button preset-button" data-src="アリス.png">アリス</button>
        <button class="u-button preset-button" data-src="モモイ.png">モモイ</button>
        <button class="u-button preset-button" data-src="ミドリ.png">ミドリ</button>
        <button class="u-button preset-button" data-src="ユズ.png">ユズ</button>
        <button class="u-button preset-button" data-src="ヒフミ.png">ヒフミ</button>
        <button class="u-button preset-button" data-src="ハナコ.png">ハナコ</button>
        <button class="u-button preset-button" data-src="アズサ.png">アズサ</button>
        <button class="u-button preset-button" data-src="コハル.png">コハル</button>
        <button class="u-button preset-button" data-src="ユウカ.png">ユウカ</button>
        <button class="u-button preset-button" data-src="ノア.png">ノア</button>
        <button class="u-button preset-button" data-src="コユキ.png">コユキ</button>
        <button class="u-button preset-button" data-src="リオ.png">リオ</button>
      </div>

      <img id="image-preview">
    </div>
    <button id="ar-button" class="u-button">ARを開始</button>
    <div id="instructions" style="display: none;">平面にカメラを向けてください</div>
    <div id="edit-controls" style="display: none;">
      <div id="selection-status">キャラクター未選択</div>
      <button id="add-character-button" class="u-button hidden">キャラを追加</button>
      <button id="scale-down-button" class="u-button" disabled>小さく</button>
      <button id="scale-up-button" class="u-button" disabled>大きく</button>
      <button id="shoot-mode-button" class="u-button" disabled>撮影モード</button>
      <button id="exit-ar-button" class="u-button">戻る</button>
    </div>
  </div>

  <a-scene
    id="scene"
    webxr="optionalFeatures: hit-test, local-floor, dom-overlay; overlayElement: #main-ui;"
    ar-hit-test="target: #reticle; type: hittest; mapSize: 0.5 0.5"
    xr-mode-ui="enabled: false"
    renderer="colorManagement: true;"
  >
    <a-assets>
      <img id="character-texture" src="シロコ.png" crossorigin="anonymous">
      <img id="circle-texture" src="circle.png" crossorigin="anonymous">
    </a-assets>
    <a-camera></a-camera>

    <a-entity
      id="reticle"
      geometry="primitive: ring; radius-inner: 0.05; radius-outer: 0.08;"
      material="color: white; shader: flat;"
      rotation="-90 0 0"
      visible="false"
    ></a-entity>

    <a-entity id="characters-container"></a-entity>
  </a-scene>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const sceneEl = document.querySelector('a-scene');
      const mainUI = document.getElementById('main-ui');
      const uploadContainer = document.getElementById('upload-container');
      const imageUploadInput = document.getElementById('image-upload-input');
      const imagePreview = document.getElementById('image-preview');
      const arButton = document.getElementById('ar-button');
      const instructionsEl = document.getElementById('instructions');
      const editControls = document.getElementById('edit-controls');
      const selectionStatus = document.getElementById('selection-status');
      const addCharacterButton = document.getElementById('add-character-button');
      const scaleDownButton = document.getElementById('scale-down-button');
      const scaleUpButton = document.getElementById('scale-up-button');
      const shootModeButton = document.getElementById('shoot-mode-button');
      const exitArButton = document.getElementById('exit-ar-button');
      const characterTexture = document.getElementById('character-texture');
      const reticle = document.getElementById('reticle');
      const charactersContainer = document.getElementById('characters-container');

      const fixedCharacterHeight = 1.7;
      let currentCharacterSrc = characterTexture.getAttribute('src') || characterTexture.src;
      let currentCharacterWidth = 0.85;
      let currentCharacterLabel = 'シロコ';
      let currentCharacterKey = currentCharacterSrc;
      let activeCharacter = null;
      let placedCharacters = [];
      let isFallbackMode = false;
      let isShootingMode = false;
      let suppressNextPlacement = false;
      let isExitingSession = false;
      let exitSessionTimeoutId = null;
      let characterCounter = 0;
      const createdObjectUrls = new Set();

      function suppressPlacementTemporarily() {
        suppressNextPlacement = true;
        window.setTimeout(() => {
          suppressNextPlacement = false;
        }, 250);
      }

      function cloneVector(vector) {
        return { x: vector.x, y: vector.y, z: vector.z };
      }

      function clearExitSessionTimeout() {
        if (exitSessionTimeoutId !== null) {
          window.clearTimeout(exitSessionTimeoutId);
          exitSessionTimeoutId = null;
        }
      }

      function getActiveXrSession() {
        return sceneEl.renderer && sceneEl.renderer.xr && sceneEl.renderer.xr.getSession
          ? sceneEl.renderer.xr.getSession()
          : null;
      }

      function sessionIsActive() {
        return editControls.style.display !== 'none';
      }

      function updateControlStates() {
        const hasActiveCharacter = Boolean(activeCharacter);
        const hasPlacedCharacter = placedCharacters.length > 0;
        scaleDownButton.disabled = !hasActiveCharacter;
        scaleUpButton.disabled = !hasActiveCharacter;
        shootModeButton.disabled = !hasPlacedCharacter;
      }

      function updateSelectionStatus() {
        selectionStatus.textContent = activeCharacter
          ? `選択中: ${activeCharacter.dataset.label}`
          : 'キャラクター未選択';
      }

      function updateInstructions() {
        if (!sessionIsActive() || isShootingMode) {
          instructionsEl.style.display = 'none';
          return;
        }

        if (isFallbackMode) {
          instructionsEl.textContent = '3Dビュー: 「キャラを追加」で配置 / キャラをタップで選択';
          instructionsEl.style.display = 'block';
          return;
        }

        if (reticle.getAttribute('visible')) {
          instructionsEl.textContent = '平面をタップで配置 / キャラをタップで選択';
        } else {
          instructionsEl.textContent = '平面にカメラを向けてください';
        }
        instructionsEl.style.display = 'block';
      }

      function setActiveCharacter(characterEl) {
        if (activeCharacter && activeCharacter.__selectionRing) {
          activeCharacter.__selectionRing.setAttribute('visible', false);
        }

        activeCharacter = characterEl || null;

        if (activeCharacter && activeCharacter.__selectionRing) {
          activeCharacter.__selectionRing.setAttribute('visible', true);
        }

        updateSelectionStatus();
        updateControlStates();
      }

      function clearPlacedCharacters() {
        placedCharacters.forEach((characterEl) => characterEl.remove());
        placedCharacters = [];
        setActiveCharacter(null);
        updateControlStates();
      }

      function findPlacedCharacterByKey(characterKey) {
        return placedCharacters.find((characterEl) => characterEl.dataset.characterKey === characterKey) || null;
      }

      function createCharacterEntity(position, rotation) {
        const characterEl = document.createElement('a-entity');
        const characterId = ++characterCounter;
        const ringSize = Math.max(currentCharacterWidth * 1.6, 1.1);
        const shadowRadius = Math.max(currentCharacterWidth * 0.35, 0.28);

        characterEl.dataset.characterId = String(characterId);
        characterEl.dataset.label = currentCharacterLabel || `キャラクター${characterId}`;
        characterEl.dataset.characterKey = currentCharacterKey;
        characterEl.setAttribute('position', cloneVector(position));
        characterEl.setAttribute('rotation', cloneVector(rotation));
        characterEl.setAttribute('scale', '1 1 1');

        const bodyEl = document.createElement('a-plane');
        bodyEl.setAttribute('height', fixedCharacterHeight);
        bodyEl.setAttribute('width', currentCharacterWidth);
        bodyEl.setAttribute('position', `0 ${fixedCharacterHeight / 2} 0`);
        bodyEl.setAttribute('material', {
          src: currentCharacterSrc,
          shader: 'flat',
          transparent: true,
          alphaTest: 0.5
        });

        const shadowEl = document.createElement('a-circle');
        shadowEl.setAttribute('radius', shadowRadius);
        shadowEl.setAttribute('position', '0 0.01 0');
        shadowEl.setAttribute('rotation', '-90 0 0');
        shadowEl.setAttribute('material', {
          color: 'black',
          opacity: 0.22,
          transparent: true,
          shader: 'flat'
        });

        const selectionRingEl = document.createElement('a-plane');
        selectionRingEl.setAttribute('height', ringSize);
        selectionRingEl.setAttribute('width', ringSize);
        selectionRingEl.setAttribute('position', '0 0.02 0');
        selectionRingEl.setAttribute('rotation', '-90 0 0');
        selectionRingEl.setAttribute('visible', 'false');
        selectionRingEl.setAttribute('material', {
          src: '#circle-texture',
          transparent: true,
          opacity: 0.65,
          shader: 'flat'
        });

        characterEl.appendChild(bodyEl);
        characterEl.appendChild(shadowEl);
        characterEl.appendChild(selectionRingEl);
        characterEl.__selectionRing = selectionRingEl;

        charactersContainer.appendChild(characterEl);
        placedCharacters.push(characterEl);
        setActiveCharacter(characterEl);
        return characterEl;
      }

      function placeCharacterAt(position, rotation) {
        const existingCharacter = findPlacedCharacterByKey(currentCharacterKey);
        if (existingCharacter) {
          setActiveCharacter(existingCharacter);
          updateControlStates();
          return existingCharacter;
        }

        const newCharacter = createCharacterEntity(position, rotation);
        updateControlStates();
        return newCharacter;
      }

      function fallbackPlacementPosition(index) {
        if (index === 0) {
          return { x: 0, y: -0.5, z: -2 };
        }

        const spread = Math.ceil(index / 2);
        const direction = index % 2 === 1 ? 1 : -1;
        return {
          x: direction * spread * 0.55,
          y: -0.5,
          z: -2 - (spread - 1) * 0.2
        };
      }

      function addFallbackCharacter() {
        const placement = fallbackPlacementPosition(placedCharacters.length);
        placeCharacterAt(placement, { x: 0, y: 0, z: 0 });
      }

      function enterShootingMode() {
        if (!placedCharacters.length) {
          return;
        }

        isShootingMode = true;
        mainUI.classList.add('shooting-mode');
        instructionsEl.style.display = 'none';
      }

      function exitShootingMode() {
        if (!isShootingMode) {
          return;
        }

        isShootingMode = false;
        mainUI.classList.remove('shooting-mode');
        updateInstructions();
      }

      function enterFallbackMode(message) {
        alert(message);
        isFallbackMode = true;
        mainUI.classList.add('ar-mode');
        uploadContainer.classList.add('hidden');
        arButton.classList.add('hidden');
        editControls.style.display = 'flex';
        addCharacterButton.classList.remove('hidden');

        if (!placedCharacters.length) {
          addFallbackCharacter();
        }

        updateInstructions();
        updateControlStates();
      }

      function resetToMainMenu() {
        clearExitSessionTimeout();
        isExitingSession = false;
        exitArButton.disabled = false;
        exitShootingMode();
        isFallbackMode = false;
        suppressNextPlacement = false;
        mainUI.classList.remove('ar-mode');
        mainUI.classList.remove('shooting-mode');
        uploadContainer.classList.remove('hidden');
        arButton.classList.remove('hidden');
        instructionsEl.style.display = 'none';
        editControls.style.display = 'none';
        addCharacterButton.classList.add('hidden');
        reticle.setAttribute('visible', false);
        clearPlacedCharacters();
      }

      function finishExitToMainMenu() {
        if (!isExitingSession && !sessionIsActive()) {
          return;
        }

        mainUI.classList.add('ui-exited');
        resetToMainMenu();
      }

      function requestExitToMainMenu() {
        const xrSession = getActiveXrSession();
        if (!xrSession) {
          finishExitToMainMenu();
          return;
        }

        if (isExitingSession) {
          return;
        }

        isExitingSession = true;
        exitArButton.disabled = true;
        mainUI.classList.add('ui-exited');

        Promise.resolve(xrSession.end()).catch((error) => {
          console.error(error);
          finishExitToMainMenu();
        });

        clearExitSessionTimeout();
        exitSessionTimeoutId = window.setTimeout(() => {
          if (isExitingSession) {
            finishExitToMainMenu();
          }
        }, 1000);
      }

      function projectCharacterToScreen(characterEl) {
        if (!sceneEl.camera) {
          return null;
        }

        const camera = sceneEl.camera;
        const centerWorld = characterEl.object3D.localToWorld(new THREE.Vector3(0, fixedCharacterHeight / 2, 0));
        const bottomWorld = characterEl.object3D.localToWorld(new THREE.Vector3(0, 0, 0));
        const topWorld = characterEl.object3D.localToWorld(new THREE.Vector3(0, fixedCharacterHeight, 0));

        const centerProjection = centerWorld.clone().project(camera);
        const topProjection = topWorld.clone().project(camera);
        const bottomProjection = bottomWorld.clone().project(camera);

        if (centerProjection.z < -1 || centerProjection.z > 1) {
          return null;
        }

        const screenCenterX = (centerProjection.x * 0.5 + 0.5) * window.innerWidth;
        const screenCenterY = (-centerProjection.y * 0.5 + 0.5) * window.innerHeight;
        const screenTopY = (-topProjection.y * 0.5 + 0.5) * window.innerHeight;
        const screenBottomY = (-bottomProjection.y * 0.5 + 0.5) * window.innerHeight;

        return {
          x: screenCenterX,
          y: screenCenterY,
          height: Math.abs(screenTopY - screenBottomY)
        };
      }

      function findTappedCharacter(clientX, clientY) {
        if (!sceneEl.camera || !placedCharacters.length) {
          return null;
        }

        sceneEl.object3D.updateMatrixWorld(true);
        let closestMatch = null;
        let closestDistance = Number.POSITIVE_INFINITY;

        placedCharacters.forEach((characterEl) => {
          const screenProjection = projectCharacterToScreen(characterEl);
          if (!screenProjection) {
            return;
          }

          const selectionRadius = Math.max(48, screenProjection.height * 0.35);
          const distance = Math.hypot(screenProjection.x - clientX, screenProjection.y - clientY);

          if (distance <= selectionRadius && distance < closestDistance) {
            closestDistance = distance;
            closestMatch = characterEl;
          }
        });

        return closestMatch;
      }

      function handleScenePointer(clientX, clientY) {
        if (!sessionIsActive()) {
          return;
        }

        if (isShootingMode) {
          exitShootingMode();
          suppressPlacementTemporarily();
          return;
        }

        const tappedCharacter = findTappedCharacter(clientX, clientY);
        if (tappedCharacter) {
          setActiveCharacter(tappedCharacter);
          suppressPlacementTemporarily();
        }
      }

      function setCurrentCharacter(source, label, key = source) {
        currentCharacterSrc = source;
        currentCharacterLabel = label;
        currentCharacterKey = key || source;
        characterTexture.src = source;
        imagePreview.src = source;
      }

      function updateCurrentCharacterDimensions() {
        if (!characterTexture.src || !characterTexture.complete || !characterTexture.naturalHeight) {
          return;
        }

        const aspectRatio = characterTexture.naturalWidth / characterTexture.naturalHeight;
        currentCharacterWidth = fixedCharacterHeight * aspectRatio;
      }

      characterTexture.addEventListener('load', updateCurrentCharacterDimensions);

      if (characterTexture.complete) {
        updateCurrentCharacterDimensions();
      }

      imagePreview.src = currentCharacterSrc;

      const presetSelector = document.getElementById('preset-selector');
      presetSelector.addEventListener('click', (event) => {
        const button = event.target.closest('.preset-button');
        if (!button || !button.dataset.src) {
          return;
        }

        setCurrentCharacter(button.dataset.src, button.textContent.trim(), button.dataset.src);
      });

      imageUploadInput.addEventListener('change', (event) => {
        const file = event.target.files[0];
        if (!file) {
          return;
        }

        const newUrl = URL.createObjectURL(file);
        createdObjectUrls.add(newUrl);
        const uploadKey = `upload:${file.name || 'image'}:${file.size}:${file.lastModified}`;
        setCurrentCharacter(newUrl, file.name || 'アップロード画像', uploadKey);
      });

      arButton.addEventListener('click', () => {
        mainUI.classList.remove('ui-exited');

        if (!navigator.xr) {
          enterFallbackMode('お使いのブラウザはWebXRに対応していません。3Dビューで表示します。');
          return;
        }

        navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
          if (!supported) {
            enterFallbackMode('お使いのブラウザはARに対応していません。3Dビューで表示します。');
            return;
          }

          isFallbackMode = false;
          mainUI.classList.add('ar-mode');
          uploadContainer.classList.add('hidden');
          arButton.classList.add('hidden');
          editControls.style.display = 'flex';
          addCharacterButton.classList.add('hidden');
          updateInstructions();
          updateControlStates();
          sceneEl.enterAR();
        }).catch((error) => {
          console.error(error);
          enterFallbackMode('ARセッションの確認中にエラーが発生しました。3Dビューで表示します。');
        });
      });

      sceneEl.addEventListener('ar-hit-test-achieved', () => {
        if (!isFallbackMode && !isShootingMode) {
          reticle.setAttribute('visible', true);
          updateInstructions();
        }
      });

      sceneEl.addEventListener('ar-hit-test-lost', () => {
        if (!isFallbackMode && !isShootingMode) {
          reticle.setAttribute('visible', false);
          updateInstructions();
        }
      });

      sceneEl.addEventListener('ar-hit-test-select', () => {
        if (isShootingMode) {
          exitShootingMode();
          suppressPlacementTemporarily();
          return;
        }

        if (suppressNextPlacement) {
          suppressNextPlacement = false;
          return;
        }

        const reticlePosition = reticle.getAttribute('position');
        const reticleRotation = reticle.getAttribute('rotation');
        if (!reticlePosition) {
          return;
        }

        placeCharacterAt(reticlePosition, reticleRotation || { x: 0, y: 0, z: 0 });
        updateInstructions();
      });

      scaleUpButton.addEventListener('click', () => {
        if (!activeCharacter) {
          return;
        }

        const currentScale = activeCharacter.getAttribute('scale');
        activeCharacter.setAttribute('scale', `${currentScale.x * 1.2} ${currentScale.y * 1.2} ${currentScale.z * 1.2}`);
      });

      scaleDownButton.addEventListener('click', () => {
        if (!activeCharacter) {
          return;
        }

        const currentScale = activeCharacter.getAttribute('scale');
        activeCharacter.setAttribute('scale', `${currentScale.x * 0.8} ${currentScale.y * 0.8} ${currentScale.z * 0.8}`);
      });

      shootModeButton.addEventListener('click', () => {
        enterShootingMode();
      });

      addCharacterButton.addEventListener('click', () => {
        addFallbackCharacter();
      });

      exitArButton.addEventListener('click', () => {
        requestExitToMainMenu();
      });

      sceneEl.addEventListener('exit-vr', () => {
        finishExitToMainMenu();
      });

      window.addEventListener('pointerup', (event) => {
        if (!sessionIsActive()) {
          return;
        }

        if (!isShootingMode && mainUI.contains(event.target)) {
          return;
        }

        handleScenePointer(event.clientX, event.clientY);
      }, true);

      window.addEventListener('beforeunload', () => {
        createdObjectUrls.forEach((url) => URL.revokeObjectURL(url));
      });

      const slider = document.getElementById('preset-selector');
      let isDown = false;
      let startY;
      let scrollTop;

      slider.addEventListener('mousedown', (event) => {
        isDown = true;
        slider.style.cursor = 'grabbing';
        startY = event.pageY - slider.offsetTop;
        scrollTop = slider.scrollTop;
      });

      slider.addEventListener('mouseleave', () => {
        isDown = false;
        slider.style.cursor = 'grab';
      });

      slider.addEventListener('mouseup', () => {
        isDown = false;
        slider.style.cursor = 'grab';
      });

      slider.addEventListener('mousemove', (event) => {
        if (!isDown) {
          return;
        }

        event.preventDefault();
        const y = event.pageY - slider.offsetTop;
        const walk = y - startY;
        slider.scrollTop = scrollTop - walk;
      });

      const presetButtons = document.querySelectorAll('.preset-button');
      presetButtons.forEach((button) => {
        if (button.textContent.length < 5) {
          button.style.whiteSpace = 'nowrap';
        }
      });
    });
  </script>
</body>
</html>
